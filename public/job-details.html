<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />

    <style>
      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .card {
        margin-bottom: 20px;
        border-radius: 12px;
        transition: 0.2s;
        padding: 15px;
        background: white;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .card h3 {
        margin-bottom: 15px;
        color: #6c4cff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      th {
        background: #6c4cff;
        color: white;
        text-align: left;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #f5f5ff;
      }

      .status-success {
        color: #2ecc71;
        font-weight: bold;
      }

      .status-failed {
        color: #e74c3c;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Medi Pipeline</h2>
      <a href="pipelines.html">Pipelines</a>
      <a href="jobs.html">Jobs</a>
      <a href="subscribers.html">Subscribers</a>
    </div>

    <div class="main">
      <h2>Job Deliveries</h2>

      <div class="card">
        <h3>Deliveries List</h3>

        <table>
          <thead>
            <tr>
              <th>Subscriber URL</th>
              <th>Status</th>
              <th>Attempts</th>
            </tr>
          </thead>
          <tbody id="deliveriesTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const jobId = params.get('id');

      async function loadDeliveries() {
        const res = await fetch(
          `http://localhost:8080/jobs/${jobId}/deliveries`,
        );

        if (!res.ok) {
          console.error('Failed to load deliveries');
          return;
        }

        const data = await res.json();
        const table = document.getElementById('deliveriesTable');
        table.innerHTML = '';

        const deliveries = Array.isArray(data) ? data : data.data;

        deliveries.forEach((d) => {
          table.innerHTML += `
      <tr>
        <td>${d.url}</td>
        <td class="${d.status === 'failed' ? 'status-failed' : 'status-success'}">
          ${d.status}
        </td>
        <td>${d.attempts}</td>
      </tr>
    `;
        });
      }

      loadDeliveries();
    </script>
  </body>
</html>
