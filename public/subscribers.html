<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />

    <style>
      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .card {
        margin-bottom: 20px;
        border-radius: 12px;
        transition: 0.2s;
        padding: 15px;
        background: white;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .card h3 {
        margin-bottom: 15px;
        color: #6c4cff;
      }

      input,
      select {
        display: block;
        margin: 8px 0;
        padding: 10px;
        width: 100%;
        max-width: 300px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
      }

      input:focus,
      select:focus {
        border-color: #6c4cff;
        box-shadow: 0 0 0 2px rgba(108, 76, 255, 0.1);
      }

      button {
        margin-top: 10px;
        padding: 8px 14px;
        border-radius: 8px;
        background: #6c4cff;
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #593ae0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      th {
        background: #6c4cff;
        color: white;
        text-align: left;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #f5f5ff;
      }

      td button {
        margin-right: 5px;
        padding: 6px 10px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Medi Pipeline</h2>
      <a href="pipelines.html">Pipelines</a>
      <a href="jobs.html">Jobs</a>
      <a href="subscribers.html">Subscribers</a>
    </div>

    <div class="main">
      <h2>Subscribers</h2>

      <div class="card">
        <h3>Add Subscriber</h3>
        <lable for="pipelineSelect">Pipeline:</lable>
        <select id="pipelineSelect"></select>

        <input id="url" placeholder="URL" />

        <button onclick="createSubscriber()">Add</button>
      </div>

      <div class="card">
        <h3>All Subscribers</h3>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Pipeline</th>
              <th>URL</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="subsTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      const API_SUBS = 'http://localhost:8080/subscribers';
      const API_PIPELINES = 'http://localhost:8080/pipelines';
      const token = localStorage.getItem('token');

      let pipelinesMap = {};

      async function loadPipelines() {
        const res = await fetch(API_PIPELINES, {
          headers: { Authorization: 'Bearer ' + token },
        });

        const data = await res.json();
        const select = document.getElementById('pipelineSelect');

        select.innerHTML = '';

        data.forEach((p) => {
          pipelinesMap[p.id] = p.name;

          select.innerHTML += `
      <option value="${p.id}">
        ${p.name}
      </option>
    `;
        });
      }

      async function loadSubscribers() {
        const res = await fetch(API_SUBS, {
          headers: { Authorization: 'Bearer ' + token },
        });

        const data = await res.json();
        const table = document.getElementById('subsTable');

        table.innerHTML = '';

        data.forEach((s) => {
          table.innerHTML += `
      <tr>
        <td>${s.id}</td>
        <td>${pipelinesMap[s.pipelineId] || s.pipelineId}</td>
        <td>${s.url}</td>
        <td>
          <button onclick="deleteSubscriber('${s.id}')">Delete</button>
        </td>
      </tr>
    `;
        });
      }

      async function createSubscriber() {
        const pipelineId = document.getElementById('pipelineSelect').value;
        const url = document.getElementById('url').value;

        if (!pipelineId || !url) {
          alert('Please fill all fields');
          return;
        }

        await fetch(API_SUBS, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ pipelineId, url }),
        });

        document.getElementById('url').value = '';

        loadSubscribers();
      }

      async function deleteSubscriber(id) {
        if (!confirm('Delete subscriber?')) return;

        await fetch(`${API_SUBS}/${id}`, {
          method: 'DELETE',
          headers: { Authorization: 'Bearer ' + token },
        });

        loadSubscribers();
      }

      async function init() {
        await loadPipelines();
        await loadSubscribers();
      }

      init();
    </script>
  </body>
</html>
