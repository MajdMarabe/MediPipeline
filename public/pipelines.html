<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />

    <style>
      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .card {
        margin-bottom: 20px;
        border-radius: 12px;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .card h3 {
        margin-bottom: 15px;
        color: #6c4cff;
      }

      input {
        display: block;
        margin: 8px 0;
        padding: 10px;
        width: 100%;
        max-width: 300px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: #6c4cff;
        box-shadow: 0 0 0 2px rgba(108, 76, 255, 0.1);
      }

      button {
        margin-top: 10px;
        padding: 8px 14px;
        border-radius: 8px;
        background: #6c4cff;
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #593ae0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      th {
        background: #6c4cff;
        color: white;
        text-align: left;
        padding: 12px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #f5f5ff;
      }

      td button {
        margin-right: 5px;
        padding: 6px 10px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Medi Pipeline</h2>
      <a href="pipelines.html">Pipelines</a>
      <a href="jobs.html">Jobs</a>
      <a href="subscribers.html">Subscribers</a>
    </div>

    <div class="main">
      <h2>Pipelines</h2>

      <div class="card">
        <h3>Create Pipeline</h3>

        <input id="name" placeholder="Pipeline Name" />
        <select id="actionType">
          <option value="">Select Action Type</option>
          <option value="medication_time">medication_time</option>
          <option value="vitals_recorded">vitals_recorded</option>
          <option value="lab_result_ready">lab_result_ready</option>
        </select>
        <button onclick="createPipeline()">Create</button>
      </div>

      <div class="card">
        <h3>All Pipelines</h3>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Action Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="pipelinesTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      const API = 'http://localhost:8080/pipelines';
      const token = localStorage.getItem('token');

      async function loadPipelines() {
        const res = await fetch(API, {
          headers: { Authorization: 'Bearer ' + token },
        });

        const data = await res.json();
        const table = document.getElementById('pipelinesTable');
        table.innerHTML = '';
        data.forEach((p) => {
          table.innerHTML += `
    <tr>
      <td>${p.id}</td>
      <td>${p.name}</td>
      <td>${p.actionType}</td>
      <td>
        <button onclick="editPipeline('${p.id}', '${p.name}', '${p.actionType}')">Edit</button>
        <button onclick="deletePipeline('${p.id}')">Delete</button>
      </td>
    </tr>
  `;
        });
      }

      async function createPipeline() {
        const name = document.getElementById('name').value;
        const actionType = document.getElementById('actionType').value;

        await fetch(API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ name, actionType }),
        });

        document.getElementById('name').value = '';
        document.getElementById('actionType').value = '';

        loadPipelines();
      }

      async function deletePipeline(id) {
        if (!confirm('Delete this pipeline?')) return;

        await fetch(`${API}/${id}`, {
          method: 'DELETE',
          headers: { Authorization: 'Bearer ' + token },
        });

        loadPipelines();
      }

      async function editPipeline(id, oldName, oldAction) {
        const name = prompt('New name:', oldName);
        const actionType = prompt('New action type:', oldAction);

        if (!name || !actionType) return;

        await fetch(`${API}/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({ name, actionType }),
        });

        loadPipelines();
      }

      loadPipelines();
    </script>
  </body>
</html>
