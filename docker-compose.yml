version: "3.9"

services:
  db:
    image: postgres:15
    container_name: medi-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0
      POSTGRES_DB: medi1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    container_name: medi-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:0@db:5432/medi1
      PLATFORM: dev
    command: npm run migrate
    volumes:
      - .:/app
      - /app/node_modules

  app:
    build: .
    container_name: medi-app
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:0@db:5432/medi1
      PLATFORM: dev
      JWT_SECRET: 50fp6AEIbvF6gbrDebxpQpF4P6JktTUBscf/ggcE2iCTI9rTjCmyAR43F7dVT20K0H8LzF4Ip8++e2ZwvWhgSg==
      POLKA_KEY: f271c81ff7084ee5b99a5091b42d486e
      PORT: 8080
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
