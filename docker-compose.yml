version: "3.9"

services:
  db:
    image: postgres:15
    container_name: medi-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0000
      POSTGRES_DB: medi1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: medi-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:0000@db:5432/medi1?sslmode=disable
      PLATFORM: dev
      JWT_SECRET: 50fp6AEIbvF6gbrDebxpQpF4P6JktTUBscf/ggcE2iCTI9rTjCmyAR43F7dVT20K0H8LzF4Ip8++e2ZwvWhgSg==
      POLKA_KEY: f271c81ff7084ee5b99a5091b42d486e
      PORT: 8080
    command: npm run dev

    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
